<blank pageTitle="Dashboard" pageIcon="bi-speedometer2" pageDescription="Sistem genel durumu ve performans g&#246;stergeleri" [showBackBtn]="false" [showStatusCheckbox]="false">
    <div class="row g-4 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="admin-card dashboard-stat-card">
                <div class="card-body">
                    <div class="stat-card-content">
                        <div class="stat-icon bg-primary">
                            <i class="bi bi-calendar-check"></i>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-number">{{activeReservationCount()}}</h3>
                            <p class="stat-label">Aktif Rezervasyonlar</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="admin-card dashboard-stat-card">
                <div class="card-body">
                    <div class="stat-card-content">
                        <div class="stat-icon bg-success">
                            <i class="bi bi-car-front"></i>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-number">{{vehicleCount()}}</h3>
                            <p class="stat-label">Toplam Ara&#231; Say&#305;s&#305;</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="admin-card dashboard-stat-card">
                <div class="card-body">
                    <div class="stat-card-content">
                        <div class="stat-icon bg-warning">
                            <i class="bi bi-currency-dollar"></i>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-number">{{formatCurrency(currentMonthIncome())}}</h3>
                            <p class="stat-label">Bu Ay Geliri</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="admin-card dashboard-stat-card">
                <div class="card-body">
                    <div class="stat-card-content">
                        <div class="stat-icon bg-info">
                            <i class="bi bi-people"></i>
                        </div>
                        <div class="stat-info">
                            <h3 class="stat-number">{{customerCount()}}</h3>
                            <p class="stat-label">Toplam M&#252;&#351;teri</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-8">
            <div class="admin-card">
                <div class="card-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <h6><i class="bi bi-graph-up text-primary me-2"></i>Gelir Analizi</h6>
                        <span class="badge bg-light text-dark">Son 7 G&#252;n</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas #revenueChartCanvas id="revenueChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="admin-card">
                <div class="card-header">
                    <h6><i class="bi bi-pie-chart text-primary me-2"></i>Rezervasyon Durumu</h6>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas #reservationStatusChartCanvas id="reservationStatusChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</blank>
